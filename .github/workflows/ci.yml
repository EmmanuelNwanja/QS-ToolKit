name: QSToolkit — Daily Jobs & CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Daily cron: 8AM WAT = 7AM UTC
  schedule:
    - cron: '0 7 * * *'

jobs:
  # ── Lint / CI ──────────────────────────────────────────────
  ci:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Check backend files exist
        working-directory: backend
        run: |
          echo "✅ Backend structure check"
          ls src/controllers/ src/routes/ src/services/

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build frontend (type check)
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.qstoolkit.com/api/v1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # ── Daily Cron Jobs ────────────────────────────────────────
  daily-jobs:
    name: ⏰ Daily Scheduled Jobs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Trigger scheduler endpoint
        run: |
          echo "Triggering QSToolkit daily jobs..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://api.qstoolkit.com/api/v1/cron/run)
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Cron job failed with status $response"
            exit 1
          fi
          echo "✅ Daily jobs completed successfully"
