      <stop offset="0%" style="stop-color:#1a3c5e"/>
      <stop offset="100%" style="stop-color:#2d5a8c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- QS Badge -->
  <rect x="60" y="60" width="80" height="80" rx="16" fill="#f59e0b"/>
