services:
  - type: web
    name: qstoolkit-api
    env: node
    region: oregon           # Closest available free region to West Africa
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        fromGroup: qstoolkit-secrets
      - key: SUPABASE_URL
        fromGroup: qstoolkit-secrets
      - key: SUPABASE_SERVICE_KEY
        fromGroup: qstoolkit-secrets
      - key: SUPABASE_ANON_KEY
        fromGroup: qstoolkit-secrets
      - key: JWT_SECRET
        fromGroup: qstoolkit-secrets
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MAILJET_API_KEY
        fromGroup: qstoolkit-secrets
      - key: MAILJET_API_SECRET
        fromGroup: qstoolkit-secrets
      - key: MAILJET_SENDER_EMAIL
        value: noreply@qs.solnuv.com
      - key: MAILJET_SENDER_NAME
        value: QSToolkit
      - key: PAYSTACK_SECRET_KEY
        fromGroup: qstoolkit-secrets
      - key: PAYSTACK_PUBLIC_KEY
        fromGroup: qstoolkit-secrets
      - key: CRON_SECRET
        fromGroup: qstoolkit-secrets
